# SecMutBench Multi-Agent System Configuration
# =============================================

orchestrator:
  checkpoint_interval: 300  # seconds (5 minutes)
  max_retries: 3
  parallel_agents: 3
  log_level: INFO

improvement:
  target_samples: 100
  samples_per_cwe_tier1: 20
  samples_per_cwe_tier2: 10

  cwe_tier1:
    - "89"   # SQL Injection
    - "79"   # XSS
    - "78"   # Command Injection
    - "22"   # Path Traversal
    - "20"   # Input Validation

  cwe_tier2:
    - "287"  # Authentication Bypass
    - "306"  # Missing Authentication
    - "352"  # CSRF
    - "502"  # Insecure Deserialization
    - "798"  # Hardcoded Credentials

experiment:
  # Local models (via Ollama)
  local_models:
    - name: "qwen2.5-coder:7b"
      enabled: true
      timeout: 120
    - name: "codellama:13b"
      enabled: true
      timeout: 120
    - name: "deepseek-coder:6.7b"
      enabled: true
      timeout: 120
    - name: "starcoder2:7b"
      enabled: true
      timeout: 120

  # API models
  api_models:
    - name: "gemini-pro"
      provider: "google"
      enabled: true
      env_key: "GOOGLE_API_KEY"
    - name: "gpt-4"
      provider: "openai"
      enabled: true
      env_key: "OPENAI_API_KEY"
    - name: "gpt-5"
      provider: "openai"
      enabled: true
      env_key: "OPENAI_API_KEY"

  # LLM Judges for evaluation
  judges:
    - name: "gpt-5"
      provider: "openai"
      enabled: true
    - name: "gpt-4"
      provider: "openai"
      enabled: true
    - name: "gemini-pro"
      provider: "google"
      enabled: true
    - name: "claude-3-opus"
      provider: "anthropic"
      enabled: false  # Requires ANTHROPIC_API_KEY

  # Mutation testing settings
  mutation:
    operators:
      - "PSQLI"      # Parameterized SQL Injection
      - "ISQLI"      # Inline SQL Injection
      - "RXSS"       # Reflected XSS
      - "SXSS"       # Stored XSS
      - "CMDINJECT"  # Command Injection
      - "PATHTRAVERSAL"
      - "RVALID"     # Remove Validation
      - "CREDLEAK"   # Credential Leak
    max_mutants_per_sample: 10

analysis:
  statistical_tests:
    cohens_d:
      enabled: true
      threshold: 0.5  # Medium effect size
    anova:
      enabled: true
      alpha: 0.05
    icc:
      enabled: true
      min_agreement: 0.75  # Good agreement

  charts:
    dpi: 150
    format: "png"
    types:
      - "heatmap"
      - "bar_chart"
      - "box_plot"

  reports:
    markdown: true
    latex: true
    include_raw_data: false

# Paths (relative to agentic_pipeline/)
paths:
  dataset: "../data/dataset.json"
  experiments: "./outputs/experiments"
  charts: "./outputs/charts"
  reports: "./outputs/reports"
  checkpoints: "./.agent_state/checkpoints"

# Logging
logging:
  file: "./.agent_state/progress.log"
  console: true
  level: "INFO"
